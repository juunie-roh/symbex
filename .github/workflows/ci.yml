name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, dev, deps/weekly-updates]

permissions:
  contents: read

# disable husky
env:
  HUSKY: 0

jobs:
  test_on_node:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x, 25.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm  # this only caches the pnpm store, not built natives

      # Cache native build artifacts separately
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install build tools
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CXXFLAGS: -std=c++20

      - name: Build packages
        run: pnpm build:all
      - name: Check types
        run: pnpm check-types:all
      - name: Run linter
        run: pnpm lint
      - name: Run tests
        run: pnpm test
      - name: Check exports
        run: pnpm attw:all
